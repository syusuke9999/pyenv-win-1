#:schema https://developers.openai.com/codex/config-schema.json

# --- 承認まわり: 都度の許可プロンプトを出さない -----------------------------
# "never" にすると Codex は承認を求めずに実行する。

approval_policy = "never"

# --- サンドボックス: ワークスペース(= 開いているプロジェクト)だけ書込許可 ---
# "danger-full-access" は使わない。これにより、ホームや OS 全体など
# 「関係ないローカルファイル」の書き換えは防がれる。

sandbox_mode = "workspace-write"

[sandbox_workspace_write]
# Web 検索・npm/pip 等の依存取得・GitHub API 参照のためネットは許可する。
# Codex が「勝手に」別のリモートのファイルを書き換える現実的な経路は
# 開いているプロジェクト外には存在しないため、この粒度で十分。

network_access = true

# /tmp と $TMPDIR も書込み可のまま(ビルド・一時ファイル作成で必要)

exclude_tmpdir_env_var = false
exclude_slash_tmp = false

# 必要に応じてフォーク先ディレクトリ以外にも書込許可ルートを足せる。
# writable_roots = ["/Users/you/projects/another-repo"]

# --- Web 検索を有効化(情報収集は禁じない要件) -------------------------------
# "live" で最新ページを取得。"cached" にすると OpenAI 側のインデックスのみ。

web_search = "live"

[tools]
web_search = true
view_image = true

# --- 開いたプロジェクトを信頼済みにする(.codex/ のプロジェクト設定も有効化) -
# クローンしたフォークのパスを書く(複数書いてよい)。
# "trusted" にすると初回の「このプロジェクトを信頼しますか?」も出なくなる。
# [projects."/Users/you/projects/your-fork"]
# trust_level = "trusted"

# --- 履歴・細かい挙動 --------------------------------------------------------
[history]
persistence = "save-all"

# バーストペースト検出などは好みに応じて
disable_paste_burst = false

features.fast_mode = true

model_reasoning_effort = "xhigh"

personality = "friendly"

plan_mode_reasoning_effort = "xhigh"

service_tier = "fast"

# --- モデル自身の「やっていいですか?」を抑制する ---------------------------

developer_instructions = """
【回答言語】
- ユーザーへの返答は常に日本語で行うこと。英語では返答しない。

【自律実行ルール】
ユーザーは現在のワークスペース(クローン済みフォークのローカルリポジトリ)内での
変更について、すでに全面的な自動実行権限をあなたに与えている。したがって、
以下の行為については、ユーザーに確認を取らず、黙って実行し、結果だけを報告すること:

- ワークスペース配下のファイルの作成・編集・削除
- 一時ディレクトリ($TMPDIR, /tmp, %TEMP% など)への展開・作業
- 旧バージョンと新バージョンの一時展開・出力差分の比較・挙動調査
- ビルド・テスト・lint・フォーマッタ・静的解析の実行
- 依存パッケージのインストール(npm install, pip install など、取得のみで
  リモートを書き換えない操作)
- 複数ファイルにまたがる大規模リファクタリング
- 調査のための読み取り系コマンド(git log, grep, find など)
- Web 検索による情報収集

【確認が許される例外】
次の場合に限り、事前にユーザーへ確認してよい(むしろ確認すべき):

- `git push`、プルリクエスト作成、タグの push など、
  リモートリポジトリや外部サービスの状態を変える操作
- パッケージの公開(npm publish, pip upload など)
- ワークスペース外のファイルの書き換え・削除
- クレデンシャルや秘密情報を外部に送る可能性のある操作
- ユーザーの意図がリポジトリを読んでも本当に判断できないほど曖昧な場合

【禁止する応答パターン】
ワークスペース内で完結する作業について、以下のような事前確認の発話をしては
ならない。代わりに、いきなり実行してから結果を日本語で要約すること:

- 「〜してもよいですか?」
- 「〜を実行してよろしいですか?」
- 「このまま進めてよいですか?」
- 「先に〜を確認しますか?」
- 「〜という方針で進めますがよろしいでしょうか?」
- 選択肢 (1. はい / 2. いいえ …) を提示してユーザーに選ばせる形の確認

【作業スタイル】
- タスクが大きくても、着手許可を求めずにそのまま着手する。
- 長時間の作業中は、適宜、途中経過を日本語で簡潔に報告する。
- 失敗したら、勝手にロールバックや代替案の試行まで行い、その経緯を報告する。
"""